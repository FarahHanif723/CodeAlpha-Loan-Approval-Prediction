name: Sync to HuggingFace

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Push to HuggingFace
        run: |
          git config --global user.email "farahhanif723@gmail.com"
          git config --global user.name "FarahHanif723"
          git clone https://Farah765:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Farah765/loaniq-credit-scoring hf_repo
          cd hf_repo
         rsync -av --exclude='*.pkl' --exclude='*.joblib' --exclude='.git' --exclude='hf_repo' $GITHUB_WORKSPACE/ .
          git add .
          git commit -m "Sync from GitHub" || echo "Nothing to commit"
          git push
